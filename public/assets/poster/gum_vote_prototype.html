<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Gum Vote - Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #e8e0d4;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 14px;
    font-weight: 600;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* ─── Main layout: poster + results side by side ─── */
  .main-layout {
    display: flex;
    align-items: flex-start;
    gap: 32px;
  }

  /* ─── Poster Container ─── */
  .poster-wrap {
    position: relative;
    cursor: pointer;
    border-radius: 6px;
    overflow: visible;
    flex-shrink: 0;
  }

  .poster-wrap img.main-poster {
    width: 648px;
    height: 864px;
    display: block;
    border-radius: 6px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.18);
    transition: filter 0.4s ease, transform 0.3s ease;
  }

  /* Dim main poster when popup is showing */
  .poster-wrap.popup-active img.main-poster {
    filter: brightness(0.55);
  }

  /* ─── Popup Overlay with 3 sub-posters ─── */
  .popup-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease;
    z-index: 10;
  }

  .poster-wrap.popup-active .popup-overlay {
    opacity: 1;
    pointer-events: auto;
  }

  /* Each sub-poster card (now includes name label) */
  .sub-poster-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .sub-poster {
    position: relative;
    width: 180px;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transform: scale(0.85) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .poster-wrap.popup-active .sub-poster {
    transform: scale(1) translateY(0);
  }

  .sub-poster-wrap:nth-child(1) .sub-poster { transition-delay: 0.05s; }
  .sub-poster-wrap:nth-child(2) .sub-poster { transition-delay: 0.12s; }
  .sub-poster-wrap:nth-child(3) .sub-poster { transition-delay: 0.19s; }

  .sub-poster:hover {
    transform: scale(1.1) translateY(-8px) !important;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    z-index: 20;
  }

  .sub-poster:active {
    transform: scale(0.97) translateY(0) !important;
    transition-duration: 0.1s;
  }

  .sub-poster img {
    width: 100%;
    display: block;
  }

  /* Sub-poster name label */
  .sub-poster-name {
    color: white;
    font-size: 15px;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .poster-wrap.popup-active .sub-poster-name {
    opacity: 1;
    transform: translateY(0);
  }

  .sub-poster-wrap:nth-child(1) .sub-poster-name { transition-delay: 0.1s; }
  .sub-poster-wrap:nth-child(2) .sub-poster-name { transition-delay: 0.17s; }
  .sub-poster-wrap:nth-child(3) .sub-poster-name { transition-delay: 0.24s; }

  /* Vote badge on sub-poster */
  .sub-poster .vote-badge {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(0,0,0,0.75);
    color: white;
    text-align: center;
    padding: 10px 8px;
    font-size: 13px;
    font-weight: 600;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }

  .sub-poster:hover .vote-badge {
    transform: translateY(0);
  }

  /* Voted state */
  .sub-poster.voted {
    outline: 3px solid #FFD700;
    outline-offset: 2px;
  }

  .sub-poster.voted .vote-badge {
    transform: translateY(0);
    background: rgba(255, 215, 0, 0.9);
    color: #1a1a2e;
  }

  /* ─── Results Panel (right side) ─── */
  .results-panel {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 28px 28px;
    width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    position: sticky;
    top: 40px;
  }

  .results-panel.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .results-header h2 {
    font-size: 18px;
    color: #e2e8f0;
  }

  .total-badge {
    background: #334155;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    color: #94a3b8;
  }

  .total-badge span {
    color: #e2e8f0;
    font-weight: 800;
  }

  .result-row {
    margin-bottom: 18px;
  }

  .result-row:last-child {
    margin-bottom: 0;
  }

  .result-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .result-label {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .result-count {
    font-size: 13px;
    color: #64748b;
  }

  .bar-track {
    width: 100%;
    height: 28px;
    background: #0f172a;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    padding-left: 12px;
    padding-right: 12px;
    font-size: 12px;
    font-weight: 700;
    color: white;
    min-width: 0;
    justify-content: flex-end;
  }

  .bar-1 { background: linear-gradient(135deg, #FF8B33, #FFa050); }
  .bar-2 { background: linear-gradient(135deg, #b8a080, #F4EDE5); color: #333; }
  .bar-3 { background: linear-gradient(135deg, #FF4A89, #FF7EB3); }

  .my-vote-tag {
    display: inline-block;
    background: #FFD700;
    color: #1a1a2e;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 8px;
    margin-left: 4px;
    letter-spacing: 0.3px;
  }

  /* ─── Confetti ─── */
  @keyframes confettiFall {
    0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), 140px) rotate(720deg) scale(0.3); opacity: 0; }
  }

  .confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    animation: confettiFall 0.9s ease-out forwards;
    z-index: 999;
  }

  /* ─── Vote pop animation ─── */
  @keyframes votePop {
    0% { transform: scale(1); }
    30% { transform: scale(1.15); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .sub-poster.just-voted {
    animation: votePop 0.45s ease;
  }

  /* ─── Instruction hint (top of poster) ─── */
  .hint {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    white-space: nowrap;
    z-index: 5;
  }

  .poster-wrap:not(.popup-active):hover .hint {
    opacity: 1;
  }

  .poster-wrap.popup-active .hint {
    opacity: 0;
  }
</style>
</head>
<body>

<h1>Prototype - Interactive Vote Poster</h1>

<div class="main-layout">
  <!-- Main Poster -->
  <div class="poster-wrap" id="posterWrap">
    <img class="main-poster" src="best_gum_poster.svg" alt="Best Gum Poster">

    <div class="hint">포스터를 클릭하여 투표하기</div>

    <!-- Popup Overlay -->
    <div class="popup-overlay" id="popupOverlay">
      <div class="sub-poster-wrap">
        <div class="sub-poster" data-id="1" onclick="vote(event, 1)">
          <img src="gum_poster_1.svg" alt="껌뚝지">
          <div class="vote-badge">투표하기</div>
        </div>
        <div class="sub-poster-name">1. 껌뚝지</div>
      </div>
      <div class="sub-poster-wrap">
        <div class="sub-poster" data-id="2" onclick="vote(event, 2)">
          <img src="gum_poster_2.svg" alt="껌떡지">
          <div class="vote-badge">투표하기</div>
        </div>
        <div class="sub-poster-name">2. 껌떡지</div>
      </div>
      <div class="sub-poster-wrap">
        <div class="sub-poster" data-id="3" onclick="vote(event, 3)">
          <img src="gum_poster_3.svg" alt="껌뚱지">
          <div class="vote-badge">투표하기</div>
        </div>
        <div class="sub-poster-name">3. 껌뚱지</div>
      </div>
    </div>
  </div>

  <!-- Results Panel (right side) -->
  <div class="results-panel" id="resultsPanel">
    <div class="results-header">
      <h2>투표 현황</h2>
      <div class="total-badge">총 <span id="totalCount">0</span>표</div>
    </div>

    <div class="result-row">
      <div class="result-top">
        <div class="result-label">
          <span class="color-dot" style="background:#FF8B33;"></span>
          1. 껌뚝지
          <span class="my-vote-tag" id="tag-1" style="display:none;">MY</span>
        </div>
        <div class="result-count" id="cnt-1">0표</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill bar-1" id="bar-1" style="width:0%;"><span id="pct-1"></span></div>
      </div>
    </div>

    <div class="result-row">
      <div class="result-top">
        <div class="result-label">
          <span class="color-dot" style="background:#c4a882;"></span>
          2. 껌떡지
          <span class="my-vote-tag" id="tag-2" style="display:none;">MY</span>
        </div>
        <div class="result-count" id="cnt-2">0표</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill bar-2" id="bar-2" style="width:0%;"><span id="pct-2"></span></div>
      </div>
    </div>

    <div class="result-row">
      <div class="result-top">
        <div class="result-label">
          <span class="color-dot" style="background:#FF4A89;"></span>
          3. 껌뚱지
          <span class="my-vote-tag" id="tag-3" style="display:none;">MY</span>
        </div>
        <div class="result-count" id="cnt-3">0표</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill bar-3" id="bar-3" style="width:0%;"><span id="pct-3"></span></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ─── State ───
  const votes = { 1: 14, 2: 9, 3: 18 }; // pre-seeded demo data
  let myVote = null;
  let popupOpen = false;

  // Initial render
  updateBars();

  // ─── Poster click toggles popup ───
  const posterWrap = document.getElementById('posterWrap');
  const popupOverlay = document.getElementById('popupOverlay');

  posterWrap.addEventListener('click', function(e) {
    if (e.target.closest('.sub-poster')) return;
    popupOpen = !popupOpen;
    posterWrap.classList.toggle('popup-active', popupOpen);
  });

  // Close popup when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.poster-wrap') && popupOpen) {
      popupOpen = false;
      posterWrap.classList.remove('popup-active');
    }
  });

  // ─── Vote ───
  function vote(e, id) {
    e.stopPropagation();

    // Remove previous vote
    if (myVote !== null) {
      document.querySelector(`.sub-poster[data-id="${myVote}"]`).classList.remove('voted');
      document.getElementById(`tag-${myVote}`).style.display = 'none';
      votes[myVote] = Math.max(0, votes[myVote] - 1);
    }

    // Cast new vote
    votes[id]++;
    myVote = id;

    const card = document.querySelector(`.sub-poster[data-id="${id}"]`);
    card.classList.add('voted', 'just-voted');
    card.querySelector('.vote-badge').textContent = '투표 완료!';
    document.getElementById(`tag-${id}`).style.display = 'inline-block';

    // Reset other badges
    document.querySelectorAll('.sub-poster').forEach(el => {
      const eid = parseInt(el.dataset.id);
      if (eid !== id) {
        el.classList.remove('voted');
        el.querySelector('.vote-badge').textContent = '투표하기';
      }
    });

    setTimeout(() => card.classList.remove('just-voted'), 450);

    // Confetti
    spawnConfetti(card);

    // Show results
    document.getElementById('resultsPanel').classList.add('visible');

    updateBars();
  }

  // ─── Update bar chart ───
  function updateBars() {
    const total = votes[1] + votes[2] + votes[3];
    document.getElementById('totalCount').textContent = total;

    for (let i = 1; i <= 3; i++) {
      const pct = total > 0 ? (votes[i] / total * 100) : 0;
      const bar = document.getElementById(`bar-${i}`);
      bar.style.width = pct > 0 ? `${Math.max(pct, 6)}%` : '0%';
      document.getElementById(`pct-${i}`).textContent = pct > 0 ? `${Math.round(pct)}%` : '';
      document.getElementById(`cnt-${i}`).textContent = `${votes[i]}표`;
    }
  }

  // ─── Confetti ───
  function spawnConfetti(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#FF8B33', '#FF4A89', '#96CEB4'];

    for (let i = 0; i < 16; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = `${cx + (Math.random() - 0.5) * 60}px`;
      c.style.top = `${cy + (Math.random() - 0.5) * 40}px`;
      c.style.setProperty('--dx', `${(Math.random() - 0.5) * 120}px`);
      c.style.animationDuration = `${0.5 + Math.random() * 0.5}s`;
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1000);
    }
  }

  // Show results on load if seeded
  document.getElementById('resultsPanel').classList.add('visible');
</script>

</body>
</html>
