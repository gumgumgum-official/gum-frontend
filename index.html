<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gum World</title>
    <!-- Google Fonts DNS 선점 — 모든 폰트 요청보다 먼저 커넥션 열기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Google Fonts: style.css/@import·Page.module.css/@import에 흩어져 있던 선언을
      여기서 한 번에 처리한다. CSS @import는 스타일시트 파싱 후 추가 왕복이 발생하므로
      <link>로 이동하면 HTML 파싱 단계에서 즉시 병렬 요청이 가능하다.

      포함 폰트:
        Noto Sans KR     — body 폰트 폴백 (style.css에서 이동)
        Nanum Myeongjo   — IntroStoryOverlay (Page.module.css에서 이동)
        Gowun Dodum      — GumCardsModal
        Noto Serif KR    — GumCardsModal
        Bebas Neue       — 보딩패스, 자막 등
        Barlow Condensed — 보딩패스 (400·500·600·700 통합)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400&family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Pretendard (body 1순위 폰트) — 비동기 로드, Regular 파일만 preload -->
    <link
      rel="preload"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        crossorigin
        href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css"
      />
    </noscript>
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/woff2/Pretendard-Regular.woff2"
    />
    <!-- 강원교육현옥샘체 — 말풍선 폰트, dynamic subset으로 필요 글리프만 로드 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/fonts-archive/GangwonEduHyeonok/subsets/GangwonEduHyeonok-dynamic-subset.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
