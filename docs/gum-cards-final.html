<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>껌딱지 나라 — 거울 모달</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --card-w: 168px;
        --card-h: 260px;
        --radius: 15px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "Gowun Dodum", sans-serif;
        background: #0a0a14;
        overflow: hidden;
        position: relative;
      }

      .fake-scene {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse at 20% 50%,
            rgba(80, 60, 180, 0.45) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 80% 30%,
            rgba(40, 100, 200, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 55% 80%,
            rgba(120, 60, 160, 0.25) 0%,
            transparent 45%
          ),
          #0a0a14;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .island {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .island-body {
        width: 320px;
        height: 110px;
        background: linear-gradient(to bottom, #2a2250, #1a1535);
        border-radius: 50% 50% 48% 48% / 60% 60% 40% 40%;
        position: relative;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .mirror-obj {
        position: absolute;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        transition: filter 0.3s;
      }
      .mirror-obj:hover {
        filter: brightness(1.4) drop-shadow(0 0 12px rgba(180, 160, 255, 0.6));
      }
      .mirror-obj-frame {
        width: 52px;
        height: 72px;
        border-radius: 50% 50% 46% 46% / 42% 42% 58% 58%;
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.2),
          rgba(160, 140, 255, 0.12),
          rgba(255, 255, 255, 0.08)
        );
        border: 1.5px solid rgba(255, 255, 255, 0.28);
        box-shadow:
          0 0 20px rgba(160, 140, 255, 0.3),
          inset 0 0 12px rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .mirror-obj-stand {
        width: 14px;
        height: 8px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 0 0 4px 4px;
      }
      .mirror-obj-base {
        width: 28px;
        height: 5px;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        border-radius: 50%;
      }
      .mirror-obj-label {
        margin-top: 6px;
        font-family: "Noto Serif KR", serif;
        font-weight: 300;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 2px;
      }
      .obj {
        position: absolute;
        font-size: 22px;
        opacity: 0.5;
      }
      .obj-1 {
        top: -40px;
        left: 30px;
        font-size: 16px;
      }
      .obj-2 {
        top: -50px;
        right: 40px;
        font-size: 14px;
      }
      .obj-3 {
        top: -28px;
        left: 80px;
        font-size: 12px;
      }
      .scene-hint {
        position: fixed;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Noto Serif KR", serif;
        font-weight: 300;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.22);
        letter-spacing: 3px;
        z-index: 1;
        animation: hintBlink 3s ease-in-out infinite;
      }
      @keyframes hintBlink {
        0%,
        100% {
          opacity: 0.22;
        }
        50% {
          opacity: 0.55;
        }
      }

      .ripple-flash {
        position: fixed;
        inset: 0;
        z-index: 99;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(
          circle at center,
          rgba(220, 210, 255, 0.9) 0%,
          rgba(160, 140, 255, 0.5) 40%,
          transparent 70%
        );
        transition: opacity 0.3s ease;
      }
      .ripple-flash.on {
        opacity: 1;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        backdrop-filter: blur(18px) brightness(0.5);
        -webkit-backdrop-filter: blur(18px) brightness(0.5);
        background: rgba(8, 6, 20, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.45s ease;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .modal-box {
        position: relative;
        width: 100%;
        max-width: 880px;
        max-height: 90vh;
        overflow-y: auto;
        background: rgba(14, 12, 28, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        backdrop-filter: blur(24px);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05),
          0 40px 80px rgba(0, 0, 0, 0.6),
          0 0 80px rgba(120, 100, 255, 0.08);
        padding: 44px 40px 48px;
        transform: translateY(20px) scale(0.97);
        transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      }
      .modal-box::-webkit-scrollbar {
        width: 4px;
      }
      .modal-box::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
      }
      .modal-overlay.open .modal-box {
        transform: translateY(0) scale(1);
      }

      .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.11);
        color: rgba(255, 255, 255, 0.45);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .close-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.85);
      }

      /* 헤더 — badge 제거, 타이틀만 */
      .modal-header {
        text-align: center;
        margin-bottom: 36px;
      }
      .modal-header h2 {
        font-family: "Noto Serif KR", serif;
        font-weight: 300;
        font-size: clamp(18px, 3vw, 26px);
        color: rgba(255, 255, 255, 0.85);
        line-height: 1.55;
        letter-spacing: -0.3px;
      }
      .modal-header h2 em {
        font-style: normal;
        color: #a78bfa;
      }
      .modal-header p {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.2);
        letter-spacing: 2px;
        margin-top: 10px;
      }

      /* 카드 그리드 */
      .grid {
        display: grid;
        grid-template-columns: repeat(4, var(--card-w));
        gap: 16px;
        justify-content: center;
      }
      @media (max-width: 760px) {
        :root {
          --card-w: 148px;
          --card-h: 240px;
        }
        .grid {
          grid-template-columns: repeat(2, var(--card-w));
        }
        .modal-box {
          padding: 36px 24px 40px;
        }
      }

      .card-wrap {
        width: var(--card-w);
        height: var(--card-h);
        perspective: 1000px;
        cursor: pointer;
        opacity: 0;
        transform: translateY(16px) scale(0.96);
        transition:
          opacity 0.44s ease,
          transform 0.44s ease;
      }
      .card-wrap.entered {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .card-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: var(--radius);
      }
      .card-wrap.flipped .card-inner {
        transform: rotateY(180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        inset: 0;
        border-radius: var(--radius);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      /* ── 앞면 ── */
      .card-front {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: #f5f2ee;
        transition:
          border-color 0.28s,
          box-shadow 0.28s;
      }
      .card-wrap:hover:not(.flipped) .card-front {
        border-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 0 24px rgba(200, 180, 255, 0.15);
      }
      .card-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 20%;
        border-radius: var(--radius);
      }
      .card-front-overlay {
        position: absolute;
        inset: 0;
        border-radius: var(--radius);
        background: linear-gradient(
          to bottom,
          transparent 35%,
          rgba(10, 8, 28, 0.5) 62%,
          rgba(10, 8, 28, 0.86) 100%
        );
      }
      .card-front-dot {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 2;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.8;
        box-shadow: 0 0 8px var(--accent);
      }
      .card-front-text {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 14px 14px 16px;
        z-index: 2;
      }
      .card-front-text .num {
        font-family: "Noto Serif KR", serif;
        font-weight: 300;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 2px;
        margin-bottom: 4px;
      }
      .card-front-text .gum-name {
        font-family: "Noto Serif KR", serif;
        font-weight: 400;
        font-size: 17px;
        color: rgba(255, 255, 255, 0.92);
        letter-spacing: -0.3px;
        margin-bottom: 5px;
      }
      .card-front-text .keywords {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .card-front-text .kw {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.3px;
      }

      /* ── 뒷면 ── */
      .card-back {
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
        padding: 18px 16px 16px;
        gap: 0;
      }

      /* 뒷면 상단: 번호 + 이름 + 테마 */
      .back-header {
        flex-shrink: 0;
        margin-bottom: 10px;
      }
      .back-num {
        font-family: "Noto Serif KR", serif;
        font-weight: 300;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 2px;
        margin-bottom: 4px;
      }
      .back-name {
        font-family: "Noto Serif KR", serif;
        font-weight: 400;
        font-size: 18px;
        color: rgba(255, 255, 255, 0.92);
        letter-spacing: -0.5px;
        line-height: 1.2;
        margin-bottom: 4px;
      }
      .back-theme {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.38);
        line-height: 1.4;
      }

      /* 구분선 */
      .back-divider {
        flex-shrink: 0;
        width: 28px;
        height: 1px;
        background: rgba(255, 255, 255, 0.18);
        margin-bottom: 10px;
      }

      /* 설명 텍스트 */
      .back-desc {
        flex: 1;
        font-family: "Gowun Dodum", sans-serif;
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.62);
        line-height: 1.85;
        overflow: hidden;
      }

      /* 위로 문구 */
      .back-comfort {
        flex-shrink: 0;
        margin-top: 10px;
        font-family: "Noto Serif KR", serif;
        font-weight: 300;
        font-size: 10.5px;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.7;
        padding: 9px 11px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 9px;
        border-left: 2px solid var(--accent-pure);
      }

      /* 붙이기 */
      .stick-wrap {
        margin-top: 32px;
        text-align: center;
        display: none;
      }
      .stick-wrap.visible {
        display: block;
      }
      .stick-btn {
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-family: "Gowun Dodum", sans-serif;
        font-size: 14px;
        padding: 12px 36px;
        border-radius: 100px;
        cursor: pointer;
        backdrop-filter: blur(12px);
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s;
        letter-spacing: 0.5px;
      }
      .stick-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.26);
        color: white;
      }

      .particle {
        position: fixed;
        pointer-events: none;
        border-radius: 50%;
        animation: burst 0.9s ease-out forwards;
        z-index: 999;
      }
      @keyframes burst {
        0% {
          opacity: 0.8;
          transform: translate(0, 0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(var(--dx), var(--dy)) scale(0);
        }
      }

      .toast {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%) translateY(14px);
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.11);
        color: rgba(255, 255, 255, 0.78);
        font-family: "Gowun Dodum", sans-serif;
        font-size: 13px;
        padding: 11px 26px;
        border-radius: 100px;
        opacity: 0;
        transition: all 0.36s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
        z-index: 9999;
        white-space: nowrap;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="fake-scene">
      <div class="island">
        <div class="island-body">
          <span class="obj obj-1">🌿</span>
          <span class="obj obj-2">🪨</span>
          <span class="obj obj-3">🌱</span>
          <div class="mirror-obj" id="mirrorObj">
            <div class="mirror-obj-frame">🪞</div>
            <div class="mirror-obj-stand"></div>
            <div class="mirror-obj-base"></div>
            <div class="mirror-obj-label">거울</div>
          </div>
        </div>
      </div>
    </div>
    <div class="scene-hint">거울을 클릭해봐</div>

    <div class="ripple-flash" id="rippleFlash"></div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box">
        <button class="close-btn" id="closeBtn">✕</button>
        <div class="modal-header">
          <h2>지금 나에게 필요한<br /><em>껌딱지</em>는 뭘까?</h2>
          <p>카드를 골라 오늘의 껌딱지를 만나봐</p>
        </div>
        <div class="grid" id="grid"></div>
        <div class="stick-wrap" id="stickWrap">
          <button class="stick-btn" id="stickBtn">
            🩹 이 껌딱지 나한테 붙이기
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

          <div class="num">${c.num}</div>
          <div class="gum-name">${c.name}</div>
          <div class="keywords">${c.keywords.map((k) => `<span class="kw">${k}</span>`).join("")}</div>
        </div>
      </div>
      <div class="card-back" style="background:${c.accentBg};border:1px solid ${c.accentBorder};--accent-pure:${c.accent}">
        <div class="back-header">
          <div class="back-num">${c.num} · ${c.theme}</div>
          <div class="back-name">${c.name}</div>
          <div class="back-theme">${c.title}</div>
        </div>
        <div class="back-divider"></div>
        <div class="back-desc">${c.desc.replace(/\n/g, "<br>")}</div>
        <div class="back-comfort" style="border-left-color:${c.accent}">${c.comfort.replace(/\n/g, "<br>")}</div>
      </div>
    </div>`;

        wrap.addEventListener("click", () => {
          const isFlipped = wrap.classList.contains("flipped");
          document
            .querySelectorAll(".card-wrap.flipped")
            .forEach((el) => el.classList.remove("flipped"));
          if (!isFlipped) {
            wrap.classList.add("flipped");
            flippedCard = c;
            stickWrap.classList.add("visible");
          } else {
            flippedCard = null;
            stickWrap.classList.remove("visible");
          }
        });
        grid.appendChild(wrap);
      });

      window.openMirrorModal = function () {
        rippleFlash.classList.add("on");
        setTimeout(() => {
          rippleFlash.classList.remove("on");
          modalOverlay.classList.add("open");
          if (!cardsEntered) {
            cardsEntered = true;
            document.querySelectorAll(".card-wrap").forEach((el, i) => {
              setTimeout(() => el.classList.add("entered"), 60 + i * 60);
            });
          }
        }, 300);
      };

      mirrorObj.addEventListener("click", () => window.openMirrorModal());

      function closeModal() {
        modalOverlay.classList.remove("open");
        document
          .querySelectorAll(".card-wrap.flipped")
          .forEach((el) => el.classList.remove("flipped"));
        stickWrap.classList.remove("visible");
        flippedCard = null;
      }
      closeBtn.addEventListener("click", closeModal);
      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) closeModal();
      });

      stickBtn.addEventListener("click", () => {
        if (!flippedCard) return;
        spawnParticles(flippedCard.accent);
        showToast(`${flippedCard.name}을(를) 오늘 하루 붙였어요 🩹`);
      });

      function spawnParticles(color) {
        const cx = window.innerWidth / 2,
          cy = window.innerHeight / 2;
        for (let i = 0; i < 28; i++) {
          const el = document.createElement("div");
          el.className = "particle";
          const angle = Math.random() * 2 * Math.PI,
            dist = 60 + Math.random() * 160,
            size = 3 + Math.random() * 5;
          el.style.cssText = `left:${cx}px;top:${cy}px;background:${color};width:${size}px;height:${size}px;--dx:${Math.cos(angle) * dist}px;--dy:${Math.sin(angle) * dist}px;animation-duration:${0.6 + Math.random() * 0.5}s;`;
          document.body.appendChild(el);
          el.addEventListener("animationend", () => el.remove());
        }
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2800);
      }
    </script>
  </body>
</html>
