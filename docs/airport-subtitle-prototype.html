<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>껌딱지 공항 - 자막 프로토타입</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    background: #1a1a2e;
    height: 100vh;
    cursor: default;
  }

  /* === 공항 배경 씬 === */
  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 40%, #E0F0FF 70%, #d4d4d4 70.5%, #c0c0c0 100%);
    overflow: hidden;
  }

  /* 구름 */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.8;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 40px; top: 60px; left: 10%; animation: drift 25s linear infinite; }
  .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 20px; }
  .cloud-1::after { width: 70px; height: 55px; top: -30px; left: 45px; }
  .cloud-2 { width: 90px; height: 30px; top: 120px; left: 60%; animation: drift 30s linear infinite; animation-delay: -10s; }
  .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
  .cloud-2::after { width: 55px; height: 45px; top: -25px; left: 35px; }
  .cloud-3 { width: 100px; height: 35px; top: 40px; left: 35%; animation: drift 20s linear infinite; animation-delay: -5s; }
  .cloud-3::before { width: 45px; height: 45px; top: -22px; left: 18px; }
  .cloud-3::after { width: 60px; height: 50px; top: -28px; left: 40px; }

  @keyframes drift {
    from { transform: translateX(-200px); }
    to { transform: translateX(calc(100vw + 200px)); }
  }

  /* 공항 건물 */
  .airport-building {
    position: absolute;
    bottom: 29.5%;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 180px;
    background: linear-gradient(180deg, #e8e8e8, #d0d0d0);
    border-radius: 8px 8px 0 0;
    border: 2px solid #bbb;
  }
  .airport-building::before {
    content: '껌딱지 국제공항  ✈  GUMDDARJI INT\'L AIRPORT';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 500;
    color: #555;
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .window-row {
    position: absolute;
    top: 50px;
    left: 5%;
    width: 90%;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .window {
    width: 40px;
    height: 55px;
    background: linear-gradient(180deg, #a8d8ea, #7ec8e3);
    border-radius: 4px;
    border: 2px solid #999;
    opacity: 0.9;
  }

  .control-tower {
    position: absolute;
    bottom: calc(29.5% + 178px);
    left: calc(50% + 25%);
    width: 40px;
    height: 100px;
    background: #d0d0d0;
    border: 2px solid #bbb;
  }
  .control-tower::before {
    content: '';
    position: absolute;
    top: -30px;
    left: -15px;
    width: 70px;
    height: 30px;
    background: #c8e6c9;
    border-radius: 6px;
    border: 2px solid #999;
  }

  /* 바닥(활주로) */
  .runway {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30%;
    background: #b0b0b0;
  }
  .runway-line {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 4px;
    background: repeating-linear-gradient(90deg, #fff 0px, #fff 40px, transparent 40px, transparent 80px);
  }

  /* 비행기 */
  .airplane {
    position: absolute;
    bottom: 35%;
    right: 8%;
    font-size: 48px;
    transform: scaleX(-1);
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
    animation: plane-bob 3s ease-in-out infinite;
  }
  @keyframes plane-bob {
    0%, 100% { transform: scaleX(-1) translateY(0); }
    50% { transform: scaleX(-1) translateY(-8px); }
  }

  /* 껌딱지 캐릭터들 (벤치 위) */
  .bench-area {
    position: absolute;
    bottom: 31%;
    left: 12%;
    display: flex;
    gap: 24px;
    align-items: flex-end;
  }
  .gum-character {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    position: relative;
    animation: gum-bounce 2s ease-in-out infinite;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .gum-character:hover { transform: scale(1.2); }
  .gum-character:nth-child(1) { background: #FF9AA2; animation-delay: 0s; }
  .gum-character:nth-child(2) { background: #FFB7B2; animation-delay: 0.3s; }
  .gum-character:nth-child(3) { background: #FFDAC1; animation-delay: 0.6s; }
  .gum-character:nth-child(4) { background: #B5EAD7; animation-delay: 0.9s; }
  .gum-character:nth-child(5) { background: #C7CEEA; animation-delay: 1.2s; }

  /* 눈 */
  .gum-character::before {
    content: '• •';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: #333;
    letter-spacing: 4px;
    white-space: nowrap;
  }

  @keyframes gum-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .bench {
    position: absolute;
    bottom: 28.5%;
    left: 10%;
    width: 220px;
    height: 14px;
    background: #888;
    border-radius: 3px;
  }

  /* ===== 자막 시스템 ===== */
  .subtitle-container {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .subtitle-box {
    background: rgba(40, 40, 40, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 10px 28px;
    border-radius: 6px;
    max-width: 700px;
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .subtitle-box.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .subtitle-box.fade-out {
    opacity: 0;
    transform: translateY(-4px);
  }

  .subtitle-text {
    color: rgba(255, 255, 255, 0.92);
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }

  .subtitle-label {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  /* 딩동댕동 이펙트 */
  .chime-indicator {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    padding: 8px 20px;
    border-radius: 20px;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 100;
    pointer-events: none;
  }
  .chime-indicator.visible { opacity: 1; }

  /* 컨트롤 */
  .controls {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 200;
    display: flex;
    gap: 8px;
  }
  .control-btn {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }
  .control-btn:hover {
    background: rgba(255,255,255,0.25);
  }
  .control-btn.active {
    background: rgba(100, 200, 255, 0.3);
    border-color: rgba(100, 200, 255, 0.5);
  }

  /* 안내 텍스트 */
  .info-text {
    position: fixed;
    bottom: 16px;
    right: 16px;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    z-index: 50;
  }
</style>
</head>
<body>

<div class="scene">
  <!-- 구름 -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <!-- 공항 건물 -->
  <div class="airport-building">
    <div class="window-row">
      <div class="window"></div><div class="window"></div><div class="window"></div>
      <div class="window"></div><div class="window"></div><div class="window"></div>
      <div class="window"></div><div class="window"></div><div class="window"></div>
      <div class="window"></div><div class="window"></div><div class="window"></div>
    </div>
  </div>
  <div class="control-tower"></div>

  <!-- 활주로 -->
  <div class="runway">
    <div class="runway-line"></div>
  </div>

  <!-- 벤치 + 껌딱지들 -->
  <div class="bench"></div>
  <div class="bench-area">
    <div class="gum-character" title="울보 껌딱지"></div>
    <div class="gum-character" title="집착 껌딱지"></div>
    <div class="gum-character" title="선물 껌딱지"></div>
    <div class="gum-character" title="기록 껌딱지"></div>
    <div class="gum-character" title="기도 껌딱지"></div>
  </div>

  <!-- 비행기 -->
  <div class="airplane">✈️</div>
</div>

<!-- 딩동 표시 -->
<div class="chime-indicator" id="chime">🎶 딩동댕동 ~</div>

<!-- 자막 -->
<div class="subtitle-container" id="subtitleContainer">
  <div class="subtitle-box" id="subtitleBox">
    <div class="subtitle-label">ANNOUNCEMENT</div>
    <div class="subtitle-text" id="subtitleText"></div>
  </div>
</div>

<!-- 컨트롤 버튼 -->
<div class="controls">
  <button class="control-btn active" id="btnPlay" onclick="startAnnouncement()">▶ 안내방송 재생</button>
  <button class="control-btn" id="btnStyle" onclick="toggleStyle()">스타일 전환</button>
</div>

<div class="info-text">프로토타입 · 실제 구현 시 음성 타이밍에 맞춰 싱크</div>

<script>
const announcements = [
  {
    type: 'chime',
    duration: 1800
  },
  {
    text: '잠시 후, 껌딱지 항공 \'GUM 2026\'편이\n여러분의 일상을 향해 이륙할 예정입니다.',
    duration: 5000
  },
  {
    text: '비행기로 이동하시기 전,\n공항 구석구석에 숨겨진 추억들을\n마지막으로 한 번만 더 눈에 담아주세요.',
    duration: 5500
  },
  {
    type: 'pause',
    duration: 3000
  },
  {
    type: 'chime-small',
    duration: 1200
  },
  {
    text: '혹시 두고 가시는 소중한 마음은 없으신가요?',
    duration: 3500
  },
  {
    text: '포토 부스에서 찍은 \'스티커 사진\'은\n여러분의 가슴 속에 영원히 저장될 예정이니\n걱정 마세요!',
    duration: 5000
  },
  {
    type: 'pause',
    duration: 2000
  },
  {
    text: '이곳에서의 기억이 여러분의 일상에\n말랑말랑한 껌딱지처럼 착! 달라붙어\n기분 좋은 힘이 되었으면 좋겠습니다.',
    duration: 5500
  }
];

const subtitleBox = document.getElementById('subtitleBox');
const subtitleText = document.getElementById('subtitleText');
const chimeEl = document.getElementById('chime');

let currentStyle = 0;
let isPlaying = false;

const styles = [
  { bg: 'rgba(40, 40, 40, 0.55)', color: 'rgba(255,255,255,0.92)', label: '기본 (회색 반투명)' },
  { bg: 'rgba(20, 20, 20, 0.7)', color: 'rgba(255,255,255,0.95)', label: '진한 배경' },
  { bg: 'rgba(255,255,255,0.12)', color: 'rgba(255,255,255,0.75)', label: '유리 느낌' },
];

function toggleStyle() {
  currentStyle = (currentStyle + 1) % styles.length;
  const s = styles[currentStyle];
  subtitleBox.style.background = s.bg;
  subtitleText.style.color = s.color;
  document.getElementById('btnStyle').textContent = styles[(currentStyle + 1) % styles.length].label + ' →';
}

async function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function showSubtitle(text) {
  subtitleText.innerHTML = text.replace(/\n/g, '<br>');
  subtitleBox.classList.remove('fade-out');
  subtitleBox.classList.add('visible');
}

async function hideSubtitle() {
  subtitleBox.classList.remove('visible');
  subtitleBox.classList.add('fade-out');
  await sleep(600);
}

async function showChime(small = false) {
  chimeEl.textContent = small ? '🔔 띵 -' : '🎶 딩동댕동 ~';
  chimeEl.classList.add('visible');
  await sleep(small ? 1000 : 1500);
  chimeEl.classList.remove('visible');
}

async function startAnnouncement() {
  if (isPlaying) return;
  isPlaying = true;

  const btn = document.getElementById('btnPlay');
  btn.textContent = '⏸ 재생 중...';
  btn.classList.add('active');

  for (const item of announcements) {
    if (!isPlaying) break;

    if (item.type === 'chime') {
      await showChime(false);
      await sleep(300);
    } else if (item.type === 'chime-small') {
      await showChime(true);
      await sleep(300);
    } else if (item.type === 'pause') {
      await sleep(item.duration);
    } else {
      await showSubtitle(item.text);
      await sleep(item.duration);
      await hideSubtitle();
      await sleep(400);
    }
  }

  isPlaying = false;
  btn.textContent = '▶ 다시 재생';
  btn.classList.remove('active');
}

// 껌딱지 마우스 추적
const gums = document.querySelectorAll('.gum-character');
document.addEventListener('mousemove', (e) => {
  gums.forEach(gum => {
    const rect = gum.getBoundingClientRect();
    const gumX = rect.left + rect.width / 2;
    const gumY = rect.top + rect.height / 2;
    const angle = Math.atan2(e.clientY - gumY, e.clientX - gumX);
    const offsetX = Math.cos(angle) * 3;
    const offsetY = Math.sin(angle) * 2;
    gum.style.setProperty('--eye-x', offsetX + 'px');
    gum.style.setProperty('--eye-y', offsetY + 'px');

    // 눈 위치 미세 조정
    const beforeStyle = `${offsetX > 0 ? '•  •' : '•  •'}`;
    gum.style.textIndent = offsetX + 'px';
  });
});

// 초기 스타일 버튼 텍스트
document.getElementById('btnStyle').textContent = styles[1].label + ' →';

// 자동 재생
setTimeout(() => startAnnouncement(), 1000);
</script>
</body>
</html>
